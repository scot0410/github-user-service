version: '3.8'

services:
  redis:
    image: redis:7.4-alpine
    container_name: github-user-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-user-service
    ports:
      - "8080:8080"
    environment:
      # Directs Spring Boot to connect to the Redis container name, not localhost
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # Enables Virtual Threads inside the Docker container
      - SPRING_THREADS_VIRTUAL_ENABLED=true
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
